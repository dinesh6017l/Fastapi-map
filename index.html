<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #header { background: #1a1a2e; color: #fff; padding: 10px 16px; font-size: 15px; font-weight: bold; }
    #container { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 260px; background: #f4f4f4; border-right: 1px solid #ddd; overflow-y: auto; padding: 12px; }
    #sidebar h3 { font-size: 13px; color: #555; text-transform: uppercase; margin-bottom: 10px; }
    .layer-item { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
    .layer-item.active { border-color: #4a90e2; background: #eef4ff; }
    .layer-item label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .layer-item input[type="checkbox"] { cursor: pointer; }
    .layer-meta { font-size: 11px; color: #888; margin-top: 4px; margin-left: 22px; }
    .layer-color { display: inline-block; width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    #map { flex: 1; }
    #popup-info {
      position: absolute; bottom: 30px; left: 280px;
      background: #fff; border: 1px solid #ccc; border-radius: 6px;
      padding: 10px 14px; max-width: 300px; max-height: 300px;
      overflow-y: auto; font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: none; z-index: 10;
    }
    #popup-info h4 { font-size: 13px; margin-bottom: 6px; color: #333; }
    #popup-close { float: right; cursor: pointer; font-size: 14px; color: #999; }
    #popup-close:hover { color: #333; }
    #popup-info table { width: 100%; border-collapse: collapse; }
    #popup-info td { padding: 2px 4px; vertical-align: top; word-break: break-all; }
    #popup-info td:first-child { font-weight: 600; color: #555; width: 40%; }
    #loading { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; display: none; z-index: 20; }
    #status { font-size: 11px; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>

<div id="header">FastAPI + PostGIS Map</div>
<div id="container">
  <div id="sidebar">
    <h3>Layers</h3>
    <div id="status">Loading layers...</div>
    <div id="layer-list"></div>
  </div>
  <div id="map"></div>
  <div id="loading">Loading...</div>
  <div id="popup-info">
    <span id="popup-close">✕</span>
    <h4 id="popup-title">Feature Info</h4>
    <table id="popup-table"></table>
  </div>
</div>

<script>
  // ── CHANGE THESE ──────────────────────────────────────────────
  const API_URL = 'https://fastapi-map.onrender.com';
  const MAP_CENTER = [84.0, 28.3]; // [lng, lat]
  const MAP_ZOOM = 7;
  const LIMIT = 5000;
  // ─────────────────────────────────────────────────────────────

  const COLORS = [
    '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
    '#9b59b6', '#1abc9c', '#e67e22', '#e91e63'
  ];

  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        osm: {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© OpenStreetMap contributors'
        }
      },
      layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
    },
    center: MAP_CENTER,
    zoom: MAP_ZOOM
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-right');
  map.addControl(new maplibregl.ScaleControl(), 'bottom-right');

  const addedLayers = {};

  // ── FETCH LAYER LIST ─────────────────────────────────────────
  async function loadLayerList() {
    try {
      const res = await fetch(`${API_URL}/collections`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const layers = await res.json();
      document.getElementById('status').textContent = `${layers.length} layer(s) found`;
      layers.forEach((layer, i) => renderLayerItem(layer, COLORS[i % COLORS.length]));
    } catch (err) {
      document.getElementById('status').textContent = `Error: ${err.message}`;
      console.error(err);
    }
  }

  // ── RENDER SIDEBAR ITEM ──────────────────────────────────────
  function renderLayerItem(layer, color) {
    const div = document.createElement('div');
    div.className = 'layer-item';
    div.id = `item-${layer.name}`;
    div.innerHTML = `
      <label>
        <input type="checkbox" id="chk-${layer.name}" />
        <span class="layer-color" style="background:${color}"></span>
        ${layer.name}
      </label>
      <div class="layer-meta">${layer.type}</div>
    `;
    document.getElementById('layer-list').appendChild(div);

    document.getElementById(`chk-${layer.name}`).addEventListener('change', (e) => {
      if (e.target.checked) {
        addLayer(layer, color);
        div.classList.add('active');
      } else {
        removeLayer(layer.name);
        div.classList.remove('active');
      }
    });
  }

  // ── ADD LAYER ────────────────────────────────────────────────
  async function addLayer(layer, color) {
    document.getElementById('loading').style.display = 'block';
    try {
      const res = await fetch(`${API_URL}/collections/${layer.name}/items?limit=${LIMIT}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const geojson = await res.json();

      if (!geojson.features || geojson.features.length === 0) {
        console.warn('No features:', layer.name);
        return;
      }

      map.addSource(layer.name, {
        type: 'geojson',
        data: geojson
      });

      const fillId   = `${layer.name}-fill`;
      const lineId   = `${layer.name}-line`;
      const circleId = `${layer.name}-circle`;

      map.addLayer({
        id: fillId, type: 'fill',
        source: layer.name,
        paint: { 'fill-color': color, 'fill-opacity': 0.4 },
        filter: ['any',
          ['==', ['geometry-type'], 'Polygon'],
          ['==', ['geometry-type'], 'MultiPolygon']
        ]
      });

      map.addLayer({
        id: lineId, type: 'line',
        source: layer.name,
        paint: { 'line-color': color, 'line-width': 1.5 },
        filter: ['any',
          ['==', ['geometry-type'], 'LineString'],
          ['==', ['geometry-type'], 'MultiLineString'],
          ['==', ['geometry-type'], 'Polygon'],
          ['==', ['geometry-type'], 'MultiPolygon']
        ]
      });

      map.addLayer({
        id: circleId, type: 'circle',
        source: layer.name,
        paint: {
          'circle-color': color,
          'circle-radius': 5,
          'circle-stroke-color': '#fff',
          'circle-stroke-width': 1
        },
        filter: ['any',
          ['==', ['geometry-type'], 'Point'],
          ['==', ['geometry-type'], 'MultiPoint']
        ]
      });

      addedLayers[layer.name] = { fillId, lineId, circleId };

      // fit map to layer bounds
      const coords = [];
      geojson.features.forEach(f => { if (f.geometry) collectCoords(f.geometry, coords); });
      if (coords.length) {
        const lngs = coords.map(c => c[0]);
        const lats = coords.map(c => c[1]);
        map.fitBounds(
          [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
          { padding: 40, maxZoom: 14 }
        );
      }

      [fillId, lineId, circleId].forEach(lid => {
        map.on('click', lid, (e) => showPopup(e, layer.name));
        map.on('mouseenter', lid, () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', lid, () => { map.getCanvas().style.cursor = ''; });
      });

    } catch (err) {
      console.error('Failed to add layer:', layer.name, err);
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  // ── COLLECT COORDS FOR BBOX ───────────────────────────────────
  function collectCoords(geometry, out) {
    const t = geometry.type;
    if (t === 'Point') { out.push(geometry.coordinates); }
    else if (t === 'MultiPoint' || t === 'LineString') { out.push(...geometry.coordinates); }
    else if (t === 'MultiLineString' || t === 'Polygon') { geometry.coordinates.forEach(r => out.push(...r)); }
    else if (t === 'MultiPolygon') { geometry.coordinates.forEach(p => p.forEach(r => out.push(...r))); }
  }

  // ── REMOVE LAYER ─────────────────────────────────────────────
  function removeLayer(layerName) {
    const info = addedLayers[layerName];
    if (!info) return;
    [info.fillId, info.lineId, info.circleId].forEach(lid => {
      if (map.getLayer(lid)) map.removeLayer(lid);
    });
    if (map.getSource(layerName)) map.removeSource(layerName);
    delete addedLayers[layerName];
    document.getElementById('popup-info').style.display = 'none';
  }

  // ── POPUP ────────────────────────────────────────────────────
  function showPopup(e, layerName) {
    const props = e.features[0].properties;
    const table = document.getElementById('popup-table');
    document.getElementById('popup-title').textContent = layerName;
    table.innerHTML = '';
    Object.entries(props).forEach(([k, v]) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${k}</td><td>${v}</td>`;
      table.appendChild(tr);
    });
    document.getElementById('popup-info').style.display = 'block';
  }

  document.getElementById('popup-close').addEventListener('click', () => {
    document.getElementById('popup-info').style.display = 'none';
  });

  map.on('click', (e) => {
    const layerIds = Object.values(addedLayers).flatMap(l => [l.fillId, l.lineId, l.circleId]);
    const features = map.queryRenderedFeatures(e.point, { layers: layerIds });
    if (!features.length) document.getElementById('popup-info').style.display = 'none';
  });

  map.on('load', loadLayerList);
</script>
</body>
</html>
